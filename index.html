<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Corrigés Mathématiques - Expert</title>
    <!-- Chargement des bibliothèques externes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      Babel.registerPreset('react-classic', {
        presets: [
          [Babel.availablePresets['react'], { runtime: 'classic' }]
        ]
      });
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f8fafc; margin: 0; padding: 0; min-height: 100vh; }
        .font-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
        .transition-all { transition: all 0.3s ease-in-out; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const objectifs = [
                'Création d\'un corrigé pour une situation-problème',
                'Création d\'un corrigé pour une situation d\'application'
            ];
            const cycles = ['1er cycle du primaire', '2e cycle du primaire', '3e cycle du primaire'];
            const competences = [
                'Résoudre une situation-problème',
                'Raisonner à l\'aide de concepts et de processus mathématiques'
            ];
            
            const typesCorrige = [
                { 
                    id: 'interactif', 
                    label: 'Activité de Correction Interactive', 
                    icon: 'mouse-pointer-2',
                    description: 'L\'élève participe : validation immédiate, aide à la résolution intégrée et rétroaction visuelle dynamique.' 
                },
                { 
                    id: 'standard', 
                    label: 'Corrigé de Référence (Guide du maître)', 
                    icon: 'book-open',
                    description: 'Guide complet pour l\'enseignant avec analyse des démarches et solutions modèles structurées.' 
                }
            ];

            const initialFormState = {
                nomEcole: '',
                objectif: objectifs[0],
                cycle: '',
                discipline: 'Mathématique',
                competence: '',
                typeCorrigeId: 'interactif',
                taskText: '',
            };

            const [formData, setFormData] = useState(initialFormState);
            const [generatedPrompt, setGeneratedPrompt] = useState('');
            const [copySuccess, setCopySuccess] = useState(false);
            const [isVisible, setIsVisible] = useState(false);
            const resultRef = useRef(null);

            useEffect(() => {
                generatePrompt();
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [formData]);

            const generatePrompt = () => {
                const isInteractif = formData.typeCorrigeId === 'interactif';
                const nomEcole = formData.nomEcole || '[INSÉRER NOM DE L\'ÉCOLE]';

                let prompt = `META-CONSIGNE DE RENDU VISUEL ABSOLU : Tu dois agir comme un moteur de rendu HTML de haute qualité. Ne montre JAMAIS de code brut. Produis un document MAGNIFIQUE avec des couleurs professionnelles, des polices lisibles et des espacements aérés. Le résultat doit être prêt à être sélectionné et COPIÉ-COLLÉ vers Microsoft Word.

IDENTIFICATION : En-tête obligatoire : ÉCOLE : ${nomEcole}.

MÉTA-CONSIGNE TECHNIQUE (STRICTE COMPATIBILITÉ WORD) :
- Pour toutes les zones colorées (encadrés, étapes, rétroactions), tu dois OBLIGATOIREMENT utiliser des TABLEAUX HTML (<table>) à une seule cellule.
- Structure : <table width="100%" border="0" cellspacing="0" cellpadding="15"><tr><td style="background-color: #COULEUR_HEX; border-radius: 8px; border: 1px solid #BORDURE;"> [CONTENU] </td></tr></table>
- Cette structure garantit que la couleur de fond ne "fuit" pas vers le bas dans Word.

MÉTA-CONSIGNE DE RIGUEUR : Utilise les données RÉELLES de l'énoncé. Interdiction de mettre des [vides] ou des symboles génériques.

${isInteractif ? `CONSIGNE MÉTA - ACTIVITÉ INTERACTIVE : 
- Affiche impérativement un bloc "AIDE À LA RÉSOLUTION" (via structure table) listant toutes les données et contraintes.
- Crée une correction par étapes où l'élève valide ses choix.
- Rétroaction visuelle : VERT pour succès, ROUGE pour erreur.
- Utilise des visuels HTML/Tableaux pour représenter les polygones ou diagrammes.` : `CONSIGNE MÉTA - GUIDE DU MAÎTRE : 
- Document complet et esthétique pour l'enseignant.
- Présente les démarches valides (Fond vert pâle) et les démarches erronées/obstacles (Fond rouge/corail pâle).
- Inclus une solution modèle détaillée et des schémas représentés par des tableaux.`}

CONTEXTE :
- École : ${nomEcole}
- Cycle : ${formData.cycle || '[NON PRÉCISÉ]'}
- Compétence : ${formData.competence || '[NON PRÉCISÉE]'}
- Type : ${formData.objectif}

ÉNONCÉ :
${formData.taskText || '[INSERER LE TEXTE DE LA TÂCHE ICI]'}

Génère maintenant le document final en format VISUEL HTML riche pour l'école ${nomEcole}, sans aucun code visible, prêt pour le copier-coller. Ajoute le bouton d'exportation Word à la fin.`;

                setGeneratedPrompt(prompt);
            };

            const handleGenerate = () => {
                setIsVisible(true);
                setTimeout(() => {
                    resultRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    if (window.lucide) window.lucide.createIcons();
                }, 100);
            };

            const handleReset = () => {
                setFormData(initialFormState);
                setIsVisible(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleCopy = () => {
                const textArea = document.createElement("textarea");
                textArea.value = generatedPrompt;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopySuccess(true);
                    setTimeout(() => setCopySuccess(false), 2000);
                } catch (err) {}
                document.body.removeChild(textArea);
            };

            return (
                <div className="max-w-5xl mx-auto p-4 md:p-6 font-sans text-slate-900">
                    <header className="mb-8 text-center">
                        <div className="inline-flex items-center justify-center p-3 bg-indigo-100 rounded-full mb-3 shadow-inner">
                            <i data-lucide="palette" className="text-indigo-600 w-8 h-8"></i>
                        </div>
                        <h1 className="text-2xl font-bold text-indigo-700 uppercase tracking-tight">Générateur de Corrigés Visuels</h1>
                        <p className="text-slate-500 text-sm italic">Format HTML couleur prêt à copier vers Word</p>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                        <div className="bg-white p-6 rounded-2xl shadow-xl border border-slate-200 space-y-6">
                            {/* Champ Nom de l'école */}
                            <div className="p-4 bg-blue-50 border border-blue-100 rounded-xl flex items-center gap-4 transition-all focus-within:ring-2 focus-within:ring-blue-400">
                                <div className="p-2 bg-blue-600 rounded-lg shadow-md">
                                    <i data-lucide="school" className="text-white w-5 h-5"></i>
                                </div>
                                <div className="flex-1">
                                    <label className="block text-[10px] font-black text-blue-800 uppercase tracking-widest mb-1">Établissement scolaire</label>
                                    <input 
                                        type="text"
                                        placeholder="Saisissez le nom de l'école..."
                                        className="w-full bg-transparent border-none text-base outline-none font-bold text-blue-900 placeholder:text-blue-300 placeholder:font-normal"
                                        value={formData.nomEcole}
                                        onChange={(e) => setFormData({...formData, nomEcole: e.target.value})}
                                    />
                                </div>
                            </div>

                            <div className="space-y-5">
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 mb-2 uppercase tracking-wide">Cycle</label>
                                        <select 
                                            className="w-full p-3 bg-slate-50 rounded-xl border border-slate-200 text-sm outline-none focus:ring-2 focus:ring-indigo-500 font-semibold cursor-pointer appearance-none transition-all"
                                            value={formData.cycle}
                                            onChange={(e) => setFormData({...formData, cycle: e.target.value})}
                                        >
                                            <option value="">-- Choisir --</option>
                                            {cycles.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 mb-2 uppercase tracking-wide">Compétence</label>
                                        <select 
                                            className="w-full p-3 bg-slate-50 rounded-xl border border-slate-200 text-sm outline-none focus:ring-2 focus:ring-indigo-500 font-semibold cursor-pointer appearance-none transition-all"
                                            value={formData.competence}
                                            onChange={(e) => setFormData({...formData, competence: e.target.value})}
                                        >
                                            <option value="">-- Choisir --</option>
                                            {competences.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-700 mb-3 uppercase tracking-wide">Type de corrigé (Rendu Visuel Uniquement)</label>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        {typesCorrige.map(t => (
                                            <div 
                                                key={t.id} 
                                                onClick={() => setFormData({...formData, typeCorrigeId: t.id})}
                                                className={`p-4 border-2 rounded-2xl cursor-pointer transition-all ${formData.typeCorrigeId === t.id ? 'border-indigo-600 bg-indigo-50 shadow-lg scale-[1.02]' : 'border-slate-100 bg-slate-50 hover:border-indigo-200'}`}
                                            >
                                                <div className="flex items-center gap-3 mb-2">
                                                    <i data-lucide={t.icon} className={`w-5 h-5 ${formData.typeCorrigeId === t.id ? 'text-indigo-600' : 'text-slate-400'}`}></i>
                                                    <span className={`text-xs font-black uppercase ${formData.typeCorrigeId === t.id ? 'text-indigo-800' : 'text-slate-600'}`}>{t.label}</span>
                                                </div>
                                                <p className="text-[10px] text-slate-500 leading-relaxed">{t.description}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-indigo-700 mb-2 flex items-center gap-2 uppercase tracking-wide">
                                        <i data-lucide="file-text" className="w-4 h-4"></i>
                                        Énoncé de la tâche
                                    </label>
                                    <textarea
                                        placeholder="Collez ici le texte intégral de l'énoncé mathématique..."
                                        className="w-full h-32 p-4 bg-slate-50 rounded-2xl border border-slate-200 text-sm outline-none focus:ring-2 focus:ring-indigo-500 resize-none font-sans transition-all shadow-inner"
                                        value={formData.taskText}
                                        onChange={(e) => setFormData({...formData, taskText: e.target.value})}
                                    />
                                </div>

                                <div className="flex gap-3 pt-2">
                                    <button onClick={handleReset} className="px-6 py-4 bg-white text-slate-500 border-2 border-slate-200 rounded-2xl font-black text-xs uppercase hover:bg-slate-50 transition-all flex items-center gap-2 active:scale-95">
                                        <i data-lucide="refresh-cw" className="w-4 h-4"></i> Reset
                                    </button>
                                    <button 
                                        onClick={handleGenerate}
                                        disabled={!formData.cycle || !formData.competence}
                                        className={`flex-1 py-4 rounded-2xl font-black text-xs uppercase tracking-widest transition-all shadow-xl flex items-center justify-center gap-2 ${(!formData.cycle || !formData.competence) ? 'bg-slate-300 cursor-not-allowed text-slate-500 shadow-none' : 'bg-indigo-600 text-white hover:bg-indigo-700 active:scale-95 shadow-indigo-200'}`}
                                    >
                                        <i data-lucide="magic-wand" className="w-4 h-4"></i> Générer le visuel
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div ref={resultRef} className={`flex flex-col transition-all duration-700 ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-20 pointer-events-none'}`} style={{ display: isVisible ? 'flex' : 'none' }}>
                            <div className="bg-slate-900 rounded-3xl p-6 shadow-2xl border border-slate-800">
                                <div className="flex justify-between items-center mb-5">
                                    <div className="flex items-center gap-3">
                                        <div className="w-3 h-3 bg-red-500 rounded-full"></div>
                                        <div className="w-3 h-3 bg-amber-500 rounded-full"></div>
                                        <div className="w-3 h-3 bg-emerald-500 rounded-full"></div>
                                        <span className="text-slate-400 font-mono text-[10px] ml-2 uppercase tracking-widest">Engine_Output.prompt</span>
                                    </div>
                                    <button onClick={handleCopy} className={`px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-tighter transition-all transform active:scale-90 ${copySuccess ? 'bg-emerald-500 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-500 shadow-lg shadow-indigo-500/30'}`}>
                                        {copySuccess ? 'Prompt Copié !' : 'Copier pour l\'IA'}
                                    </button>
                                </div>
                                <div className="bg-black/50 border border-slate-800 rounded-2xl p-5 shadow-inner max-h-[500px] overflow-auto custom-scrollbar">
                                    <pre className="text-indigo-200 text-[11px] whitespace-pre-wrap font-mono leading-relaxed opacity-90">
                                        {generatedPrompt}
                                    </pre>
                                </div>
                            </div>
                            <div className="mt-6 p-5 bg-white rounded-2xl border-2 border-indigo-100 flex items-start gap-4 shadow-md">
                                <div className="p-2 bg-indigo-600 rounded-lg shadow-lg">
                                    <i data-lucide="info" className="text-white w-5 h-5"></i>
                                </div>
                                <div>
                                    <h4 className="text-indigo-900 font-black text-xs uppercase mb-1">Étape Finale</h4>
                                    <p className="text-[11px] text-slate-600 leading-relaxed">
                                        Collez ce prompt dans votre assistant IA. Le document généré sera <strong>entièrement visuel</strong> (en couleur). Sélectionnez simplement le texte et les tableaux générés pour les coller dans Word ou Google Docs.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        window.addEventListener('load', () => {
            if (window.lucide) lucide.createIcons();
        });
    </script>
</body>
</html>
